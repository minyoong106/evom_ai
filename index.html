  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14121b;
      --surface: #1d1a27;
      --surface-hover: #24202f;
      --ink: #eeeaf8;
      --ink-soft: #a89fc4;
      --accent: #9c8cff;
      --accent-ink: #14121b;
      --accent-soft: #2a2340;
      --coral: #ff93a3;
      --border: #2e2740;
      --shadow: rgba(0, 0, 0, 0.45);
      --grad-start: #3a2350;
      --grad-mid: #33305f;
      --grad-end: #1f3a5e;
      --accent-grad: linear-gradient(120deg, #9c7cff, #6fa0ff);
    }
  }

  :root {
    --bg: #f8f6fb;
    --surface: #ffffff;
    --surface-hover: #faf8ff;
    --ink: #17151f;
    --ink-soft: #5b5866;
    --accent: #6c4fe0;
    --accent-ink: #ffffff;
    --accent-soft: #ece7fb;
    --coral: #ff7a8a;
    --border: #e7e1f2;
    --shadow: rgba(70, 50, 120, 0.1);
    --grad-start: #fbd3e4;
    --grad-mid: #dcc9f2;
    --grad-end: #bfd3f7;
    --accent-grad: linear-gradient(120deg, #7c5cfc, #5c86f5);
  }

  :root[data-theme="dark"] {
    --bg: #14121b;
    --surface: #1d1a27;
    --surface-hover: #24202f;
    --ink: #eeeaf8;
    --ink-soft: #a89fc4;
    --accent: #9c8cff;
    --accent-ink: #14121b;
    --accent-soft: #2a2340;
    --coral: #ff93a3;
    --border: #2e2740;
    --shadow: rgba(0, 0, 0, 0.45);
    --grad-start: #3a2350;
    --grad-mid: #33305f;
    --grad-end: #1f3a5e;
    --accent-grad: linear-gradient(120deg, #9c7cff, #6fa0ff);
  }

  :root[data-theme="light"] {
    --bg: #f8f6fb;
    --surface: #ffffff;
    --surface-hover: #faf8ff;
    --ink: #17151f;
    --ink-soft: #5b5866;
    --accent: #6c4fe0;
    --accent-ink: #ffffff;
    --accent-soft: #ece7fb;
    --coral: #ff7a8a;
    --border: #e7e1f2;
    --shadow: rgba(70, 50, 120, 0.1);
    --grad-start: #fbd3e4;
    --grad-mid: #dcc9f2;
    --grad-end: #bfd3f7;
    --accent-grad: linear-gradient(120deg, #7c5cfc, #5c86f5);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Geist", -apple-system, "Apple SD Gothic Neo", "Segoe UI", "Malgun Gothic", sans-serif;
    line-height: 1.5;
  }

  .wrap {
    max-width: 1080px;
    margin: 0 auto;
    padding: 3rem 1.5rem 5rem;
  }

  header.page {
    margin-bottom: 2.5rem;
  }

  .hero {
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 2rem;
    border-radius: 26px;
    padding: 2.6rem 2.6rem;
    background: linear-gradient(135deg, var(--grad-start) 0%, var(--grad-mid) 55%, var(--grad-end) 100%);
  }

  .hero-text {
    flex: 1 1 380px;
    min-width: 0;
  }

  .hero-graphic {
    flex: 0 0 168px;
    width: 168px;
    height: 144px;
  }

  .eyebrow {
    font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 0.9rem;
  }

  h1 {
    font-family: "Geist", -apple-system, "Apple SD Gothic Neo", "Segoe UI", sans-serif;
    font-size: clamp(1.9rem, 3.2vw, 2.6rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    margin: 0 0 0.7rem;
    text-wrap: balance;
    color: var(--ink);
  }

  .grad-text {
    color: var(--accent);
    background: var(--accent-grad);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .lede {
    max-width: 56ch;
    color: var(--ink-soft);
    font-size: 1.02rem;
    margin: 0;
  }

  @media (max-width: 640px) {
    .hero {
      padding: 2.1rem 1.6rem;
    }

    .hero-graphic {
      display: none;
    }
  }

  .controls {
    margin-top: 1.6rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.7rem;
    align-items: center;
  }

  .search-box {
    flex: 1 1 240px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 0.65rem 0.9rem 0.65rem 2.1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--ink);
    font-size: 0.92rem;
    font-family: inherit;
  }

  .search-box input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
  }

  .search-box::before {
    content: "";
    position: absolute;
    left: 0.75rem;
    top: 50%;
    width: 13px;
    height: 13px;
    transform: translateY(-50%);
    border: 1.6px solid var(--ink-soft);
    border-radius: 50%;
    pointer-events: none;
  }

  .search-box::after {
    content: "";
    position: absolute;
    left: 1.32rem;
    top: 63%;
    width: 6px;
    height: 1.6px;
    background: var(--ink-soft);
    transform: rotate(45deg);
    pointer-events: none;
  }

  .count-line {
    font-size: 0.82rem;
    color: var(--ink-soft);
    margin: 1.1rem 0 0;
  }

  .count-line strong {
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }

  .events-section {
    margin-bottom: 2.6rem;
  }

  .section-head {

<script>
  const DATA = [
    {
      kr: "한국심초음파학회",
      en: "Korean Society of Echocardiography (KSE)",
      tag: "학회",
      desc: "국내 심장초음파 학술 연구와 진료 표준을 이끄는 대표 학회.",
      url: "https://www.ksecho.org/",
      events: [
        { title: "제9회 KSE Echo Webinar", start: "2026-08-12", location: "온라인", eventUrl: "https://www.ksecho.org/academic_event/annual_schedule_view.php?idx=1086&etc_1=KO" },
        { title: "제51회 한국심초음파학회 워크숍", start: "2026-08-22", location: "강동경희대학교병원", eventUrl: "https://www.ksecho.org/notice/notice.php?boardid=ksechonotice&mode=view&idx=460&etc_1=KO&page_id=mem" }
      ]
    },
    {
      kr: "대한심장학회",
      en: "Korean Society of Cardiology (KSC)",
      tag: "학회",
      desc: "심혈관질환 전반을 아우르는 국내 최대 규모의 순환기내과 학회. 매년 4월 춘계학술대회 개최(2026년은 4/17~18 경주), 추계학술대회는 아직 미공지.",
      url: "https://www.circulation.or.kr/",
      events: []
    },
    {
      kr: "대한심장혈관영상의학회",
      en: "Korean Society of Cardiovascular Imaging (KOSCI)",
      tag: "학회",
      desc: "심장 CT·MRI 등 심장혈관 영상 전반을 다루는 전문 학회.",
      url: "https://www.kosci.co.kr/",
      events: [
        { title: "대한심장혈관영상의학회 추계학회", start: "2026-10-17", location: "원주(예정)", eventUrl: "https://www.kosci.co.kr/event/schedule/view?idx=254" },
        { title: "대한심장혈관영상의학회 송년심포지엄", start: "2026-12-19", location: "장소 추후공지", eventUrl: "https://www.kosci.co.kr/event/schedule/view?idx=259" }
      ]
    },
    {
      kr: "대한임상초음파학회",
      en: "Korean Association of Clinical Ultrasound (KACU)",
      tag: "학회",
      desc: "심장·복부·혈관·근골격 등 임상 전 분야 초음파 교육을 아우르는 학술단체.",
      url: "https://www.kacu.or.kr/",
      events: [
        { title: "제28회 대한임상초음파학회 정기학술대회", start: "2026-07-26", location: "서울 스위스그랜드호텔", eventUrl: "https://www.kacu.or.kr/2026_con/registration/" },
        { title: "ISCU 2026 · 제29회 대한임상초음파학회 정기학술대회", start: "2026-12-05", end: "2026-12-06", location: "마곡 코엑스", eventUrl: "https://www.kacu.or.kr/bbs/?code=schedule" }
      ]
    },
    {
      kr: "한국초음파학회",
      en: "Korean Medical Ultrasound Association (KMUA)",
      tag: "학회",
      desc: "‘초음파는 의사의 진찰’을 표방하는 초음파 인증의 제도 운영 학회. 매년 4월 춘계·9월 추계학술대회 개최.",
      url: "https://kmua.co.kr/main/",
      events: [
        { title: "제16회 한국초음파학회 추계학술대회", start: "2026-09-20", location: "롯데호텔 서울", eventUrl: "https://kmua.co.kr/Event/2026_09_20/info.asp" }
      ]
    },
    {
      kr: "경희 심초음파 연수강좌",
      en: "Kyung Hee Echocardiography Workshop",
      tag: "학술행사",
      desc: "경희대학교병원 심장내과 주관, 2003년부터 매년 열리는 심초음파 연수강좌로 보통 4~5월 개최. 2026년 정확한 일정은 미확인.",
      url: "https://kumcim.org/index.php",
      events: []
    },
    {
      kr: "KIMES 부산",
      en: "Busan International Medical & Hospital Equipment Show",
      tag: "전시회",
      desc: "부산 벡스코에서 열리는 영남권 최대 의료기기·병원설비 전시회. 심초음파 장비 업체도 다수 참가.",
      url: "https://www.kimesbusan.com/",
      events: [
        { title: "KIMES BUSAN 2026 (제14회 부산국제의료기기전시회)", start: "2026-10-23", end: "2026-10-25", location: "벡스코(BEXCO), 부산", eventUrl: "https://www.kimesbusan.com/ko/exhibitor/apply" }
      ]
    }
  ];

  const gridEl = document.getElementById("grid");
  const emptyEl = document.getElementById("empty");
  const countEl = document.getElementById("count");
  const searchEl = document.getElementById("search");
  const eventsListEl = document.getElementById("eventsList");
  const eventsEmptyEl = document.getElementById("eventsEmpty");
  const exportAllBtn = document.getElementById("exportAll");

  const EVENTS = DATA.flatMap(item =>
    (item.events || []).map(ev => ({ ...ev, org: item.kr, url: item.url }))
  );

  function icsEscape(str) {
    return String(str).replace(/([\\,;])/g, "\\$1").replace(/\n/g, "\\n");
  }

  function toICSDate(dateStr) {
    return dateStr.replaceAll("-", "");
  }

  function addDaysISO(dateStr, days) {
    const d = new Date(dateStr + "T00:00:00");
    d.setDate(d.getDate() + days);
    return d.toISOString().slice(0, 10);
  }

  function buildVEvent(ev) {
    const dtStart = toICSDate(ev.start);
    const dtEndExclusive = toICSDate(addDaysISO(ev.end || ev.start, 1));
    const uid = `${dtStart}-${ev.title.replace(/\s+/g, "")}@echo-directory`;
    return [
      "BEGIN:VEVENT",
      `UID:${uid}`,
      `DTSTAMP:${toICSDate(new Date().toISOString().slice(0, 10))}T000000Z`,
      `DTSTART;VALUE=DATE:${dtStart}`,
      `DTEND;VALUE=DATE:${dtEndExclusive}`,
      `SUMMARY:${icsEscape(ev.title)}`,
      ev.location ? `LOCATION:${icsEscape(ev.location)}` : null,
      `DESCRIPTION:${icsEscape(`${ev.org} 주최. 자세한 정보: ${ev.url}`)}`,
      "END:VEVENT"
    ].filter(Boolean).join("\r\n");
  }

  function downloadICS(filename, vevents) {
    const ics = [
      "BEGIN:VCALENDAR",
      "VERSION:2.0",
      "PRODID:-//심장초음파 학회 디렉토리//KO",
      "CALSCALE:GREGORIAN",
      ...vevents,
      "END:VCALENDAR"
    ].join("\r\n");
    const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function renderEvents() {
    const todayStr = new Date().toISOString().slice(0, 10);
    const upcoming = EVENTS
      .filter(ev => (ev.end || ev.start) >= todayStr)
      .sort((a, b) => a.start.localeCompare(b.start));

    eventsListEl.innerHTML = "";

    upcoming.forEach(ev => {
      const start = new Date(ev.start + "T00:00:00");
      const month = start.toLocaleDateString("ko-KR", { month: "short" });
      const day = start.getDate();
      const weekday = start.toLocaleDateString("ko-KR", { weekday: "short" });
      let dateLabel = `${month} ${day}일(${weekday})`;
      if (ev.end && ev.end !== ev.start) {
        const end = new Date(ev.end + "T00:00:00");
        dateLabel += `~${end.getDate()}일`;
      }

      const card = document.createElement("article");
      card.className = "event-card";
      card.innerHTML = `
        <div class="event-date">
          <span class="event-month">${month}</span>
          <span class="event-day">${day}</span>
        </div>
        <div class="event-info">
          <div class="event-title"><a href="${ev.eventUrl || ev.url}" target="_blank" rel="noopener noreferrer">${ev.title}</a></div>
          <div class="event-meta">${ev.org}${ev.location ? " · " + ev.location : ""} · ${dateLabel}</div>
        </div>
        <button class="event-btn" type="button">캘린더에 추가</button>
      `;
      card.querySelector(".event-btn").addEventListener("click", () => {
        downloadICS(`${ev.title}.ics`, [buildVEvent(ev)]);
      });
      eventsListEl.appendChild(card);
    });

    eventsEmptyEl.style.display = upcoming.length === 0 ? "block" : "none";
    exportAllBtn.disabled = upcoming.length === 0;
    exportAllBtn.onclick = () => {
      downloadICS("심장초음파_학회_일정.ics", upcoming.map(buildVEvent));
    };
  }

  let query = "";

  function render() {
    gridEl.innerHTML = "";

    const matches = DATA.filter(item => {
      const haystack = (item.kr + " " + item.en).toLowerCase();
      return haystack.includes(query.toLowerCase());
    });

    matches.forEach(item => {
      const card = document.createElement("article");
      card.className = "card";
      const tagClass = item.tag === "학회" ? "tag" : "tag event";
      card.innerHTML = `
        <span class="${tagClass}">${item.tag}</span>
        <div class="name-kr">${item.kr}</div>
        <div class="name-en">${item.en}</div>
        <p>${item.desc}</p>
        <a class="visit" href="${item.url}" target="_blank" rel="noopener noreferrer">
          바로가기 <span class="arrow">&#8599;</span>
        </a>
      `;
      gridEl.appendChild(card);
    });

    countEl.textContent = matches.length;
    emptyEl.style.display = matches.length === 0 ? "block" : "none";
  }

  searchEl.addEventListener("input", e => {
    query = e.target.value.trim();
    render();
  });

  render();
  renderEvents();
</script>
